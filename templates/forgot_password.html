{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">

    <h3 class="text-center">Forgot Password</h3>

    <form method="POST">

        <div class="form-group">
            <label>Email</label>

            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <br>

        <div class="form-group">
            <label>New Password</label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <br>

        <button type="submit"
                class="btn btn-primary">
            Reset Password
        </button>

    </form>

</div>

{% endblock content %}
